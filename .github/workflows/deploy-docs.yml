name: Deploy VitePress site to GitHub Pages

on:
  workflow_dispatch:
    # CI disabled: this is a benchmark repo

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Rust Nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2025-07-20

      - name: Install dependencies
        run: npm ci

      - name: Build Rust docs
        run: npm run docs:rust

      - name: Build with VitePress
        run: npm run docs:build

      - name: Restore callgraph from cache
        id: cache-callgraph
        uses: actions/cache/restore@v4
        with:
          path: callgraph
          key: callgraph-nevermatch
          restore-keys: callgraph-

      - name: Copy callgraph to site
        run: |
          if [ -f callgraph/index.html ]; then
            mkdir -p site/.vitepress/dist/callgraph
            cp -r callgraph/* site/.vitepress/dist/callgraph/
            echo "✓ Callgraph added to site/callgraph/"
          else
            echo "No callgraph cache found — deploying without callgraph"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  # Deployment job
  deploy:
    # Deploy on push to master, when issues are updated, or when PRs are updated
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'issues' || github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
